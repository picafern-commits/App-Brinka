<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brinka Ultra</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

<aside class="sidebar">
  <h2>Brinka</h2>
  <button onclick="nav('dash')">Dashboard</button>
  <button onclick="nav('fecho')">Fecho</button>
  <button onclick="nav('hist')">Histórico</button>
</aside>

<main>

<section id="dash" class="page active">
  <h1>Dashboard</h1>
  <div class="card big">
    <p>Total Hoje</p>
    <h2 id="today">0€</h2>
  </div>
</section>

<section id="fecho" class="page">
  <h1>Fecho</h1>
  <div id="money"></div>

  <div class="totalBox">
    <h2 id="total">0€</h2>
    <button onclick="save()">Guardar</button>
  </div>
</section>

<section id="hist" class="page">
  <h1>Histórico</h1>
  <div id="list"></div>
</section>

</main>
</div>

<script src="app.js"></script>
</body>
</html>
